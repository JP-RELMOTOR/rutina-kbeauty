// ─── INDEXEDDB (PHOTOS) ─────────────────────────
let _db=null;
async function getDB(){
  if(_db) return _db;
  return new Promise((res,rej)=>{
    const r=indexedDB.open("kbeauty_mijal",1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains("photos"))
        d.createObjectStore("photos",{keyPath:"id",autoIncrement:true});
    };
    r.onsuccess=e=>{_db=e.target.result;res(_db);};
    r.onerror=()=>res(null);
  });
}
async function dbSavePhoto(photo){
  const db=await getDB(); if(!db) return;
  return new Promise(res=>{
    const tx=db.transaction("photos","readwrite");
    tx.objectStore("photos").add(photo);
    tx.oncomplete=()=>res(true);
  });
}
async function dbGetPhotos(){
  const db=await getDB(); if(!db) return [];
  return new Promise(res=>{
    const tx=db.transaction("photos","readonly");
    const req=tx.objectStore("photos").getAll();
    req.onsuccess=()=>res(req.result||[]);
    req.onerror=()=>res([]);
  });
}

function haptic(t="light"){try{if(navigator.vibrate){navigator.vibrate(t==="light"?12:t==="medium"?25:50);}}catch{}}
function getDOW(){return new Date().getDay();} // 0=sun
function isRetinalDay(phase){
  const d=getDOW();
  return phase===1?(d===1||d===4):(d===1||d===3||d===5);
}
function isMonday(){return getDOW()===1;}
function getGreeting(){const h=new Date().getHours();return h<12?"Buenos días":"h<20"?h<20?"Buenas tardes":"Buenas noches":"Buenas noches";}
function getDayLabel(){
  const days=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  return days[getDOW()];
}
function todayStr(){return new Date().toISOString().split("T")[0];}
function getStreak(hist){
  const dates=[...new Set(hist.map(s=>s.date))].sort().reverse();
  if(!dates.length)return 0;
  let streak=0,check=todayStr();
  for(const d of dates){
    if(d===check){streak++;const dt=new Date(check);dt.setDate(dt.getDate()-1);check=dt.toISOString().split("T")[0];}
    else if(d<check)break;
  }
  return streak;
}

// ─── RING ────────────────────────────────────────
function Ring({pct=0,size=60,stroke=4,color=P.text,track=P.cream,children}){
  const r=(size-stroke)/2,c=2*Math.PI*r;
  return<div style={{width:size,height:size,position:"relative"}}>
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} stroke={track} strokeWidth={stroke} fill="none"/>
      <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
        strokeDasharray={c} strokeDashoffset={c*(1-pct)} strokeLinecap="round"
        style={{transition:"stroke-dashoffset .4s ease"}}/>
    </svg>
    {children&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{children}</div>}
  </div>;
}

// ─── STEP CARD ───────────────────────────────────
function StepCard({step,idx,state,onTap,onComplete,onSkip}){
  const isActive=state==="active",isDone=state==="done";
  const totalSec=Math.round(step.min*60);
  const [secLeft,setSecLeft]=React.useState(totalSec);
  const [running,setRunning]=React.useState(false);
  React.useEffect(()=>{if(isActive){setSecLeft(totalSec);setRunning(true);}else setRunning(false);},[isActive,totalSec]);
  React.useEffect(()=>{if(!running||secLeft<=0)return;const id=setInterval(()=>setSecLeft(s=>Math.max(0,s-1)),1000);return()=>clearInterval(id);},[running,secLeft]);
  const pct=isActive?1-secLeft/totalSec:0;
  const mm=String(Math.floor(secLeft/60)).padStart(2,"0"),ss=String(secLeft%60).padStart(2,"0");

  if(isDone)return<div style={{background:P.card,borderRadius:20,marginBottom:8,border:`1px solid ${P.border}`,padding:"12px 16px",opacity:.5,display:"flex",alignItems:"center",gap:12}} onClick={onTap}>
    <div style={{width:32,height:32,borderRadius:16,background:P.green,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon n="check" size={16} color={P.onDark} sw={2.5}/></div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1.2,fontWeight:600}}>{step.cat}</div>
      <div style={{fontSize:14,fontWeight:500,color:P.text,textDecoration:"line-through",textDecorationColor:P.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{step.name}</div>
    </div>
    <div style={{fontSize:11,color:P.green,fontWeight:600}}>✓ {step.min}m</div>
  </div>;

  if(isActive)return<div style={{background:P.card,borderRadius:22,marginBottom:10,border:`2px solid ${P.accent}`,boxShadow:`0 8px 28px -8px ${P.shadow}`,animation:"stepIn .4s ease",overflow:"hidden"}}>
    <div style={{padding:"16px 18px 0",display:"flex",alignItems:"flex-start",gap:12}}>
      <div style={{width:34,height:34,borderRadius:17,background:P.accentSoft,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14,fontWeight:700,color:P.accent}}>{idx+1}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:10,letterSpacing:1.3,textTransform:"uppercase",color:P.accent,fontWeight:700,marginBottom:3}}>{step.cat}</div>
        <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:19,color:P.text,letterSpacing:"-.3px",lineHeight:1.2}}>{step.name}</div>
        <div style={{fontSize:12,color:P.muted,marginTop:2}}>{step.brand}</div>
      </div>
    </div>
    {step.animId&&ANIM[step.animId]&&<div style={{margin:"12px 18px 0",background:P.cream,borderRadius:14,padding:"8px",display:"flex",justifyContent:"center"}} dangerouslySetInnerHTML={{__html:ANIM[step.animId]}}/>}
    <div style={{display:"flex",alignItems:"center",gap:14,padding:"12px 18px 0"}}>
      <Ring pct={pct} size={62} stroke={4} color={P.accent} track={P.cream}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:600,color:P.text,letterSpacing:"-.5px"}}>{mm}:{ss}</div>
      </Ring>
      <button onClick={e=>{e.stopPropagation();setRunning(r=>!r);}} style={{width:38,height:38,borderRadius:19,border:`1px solid ${P.border}`,background:P.cream,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:P.text}}>
        <Icon n={running?"pause":"play"} size={13} fill={P.text} color={P.text}/>
      </button>
      <div style={{flex:1,fontSize:11,color:P.muted,letterSpacing:.3}}>Toca pausa si<br/>necesitas un momento</div>
    </div>
    {/* INSTRUCCIONES - el elemento más destacado */}
    <div style={{margin:"14px 18px 0",padding:"14px 16px",borderRadius:16,background:P.text,border:"none"}}>
      <div style={{fontSize:10,letterSpacing:1.3,textTransform:"uppercase",color:"rgba(254,252,247,.5)",fontWeight:700,marginBottom:6}}>Cómo hacerlo</div>
      <div style={{fontSize:15,color:P.onDark,lineHeight:1.55,fontWeight:500}}>{step.tip}</div>
    </div>
    <div style={{margin:"10px 18px 0",padding:"12px 14px",borderRadius:14,background:P.cream}}>
      <div style={{fontSize:10,color:P.muted,letterSpacing:1.2,textTransform:"uppercase",fontWeight:600,marginBottom:4}}>Por qué</div>
      <div style={{fontSize:13,color:P.text,lineHeight:1.5}}>{step.why}</div>
    </div>
    {step.animo&&<div style={{margin:"10px 18px 0",padding:"12px 14px",borderRadius:14,background:P.accentSoft,border:`1px solid ${P.accent}30`}}>
      <div style={{fontSize:10,color:P.accent,fontWeight:700,letterSpacing:.3,textTransform:"uppercase",marginBottom:3}}>💪 Motivación</div>
      <div style={{fontSize:13,color:P.text,lineHeight:1.5}}>{step.animo}</div>

  return<div style={{background:P.card,borderRadius:20,marginBottom:8,border:`1px solid ${P.border}`,padding:"14px 16px",cursor:"pointer"}} onClick={onTap}>

      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
          <span style={{fontSize:10,color:P.muted,textTransform:"uppercase",letterSpacing:1.2,fontWeight:600}}>{step.cat}</span>
          {step.star&&<span style={{fontSize:9,color:P.accent,background:P.accentSoft,padding:"1px 6px",borderRadius:5,fontWeight:700,letterSpacing:.3}}>CLAVE</span>}
          {step.critical&&<span style={{fontSize:9,color:"#a8511e",background:"#f4d6c1",padding:"1px 6px",borderRadius:5,fontWeight:700,letterSpacing:.3}}>NO SALTES</span>}
        </div>
        <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:16,color:P.text,letterSpacing:"-.2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{step.name}</div>
        <div style={{fontSize:11,color:P.muted,marginTop:1}}>{step.brand} · {step.min} min</div>

      <Icon n="chevR" size={16} color={P.muted}/>

  </div>;

// ─── PHOTO CAPTURE ───────────────────────────────
function PhotoCapture({onClose,onSave}){
  const inputRef=React.useRef();
  const [preview,setPreview]=React.useState(null);
  const [feel,setFeel]=React.useState(null);
  const [note,setNote]=React.useState("");
  const [saving,setSaving]=React.useState(false);

  function handleFile(e){
    const f=e.target.files?.[0];
    if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const MAX=900,ratio=Math.min(MAX/img.width,MAX/img.height);
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        setPreview(canvas.toDataURL("image/jpeg",.72));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  }

  async function handleSave(){
    if(!preview)return;
    setSaving(true);
    const moods={"😍":"Radiante","🙂":"Bien","😊":"Normal","😌":"Sensible","😟":"Irritada"};
    const entry={date:todayStr(),time:new Date().toTimeString().slice(0,5),dataUrl:preview,feel:feel||null,feelLabel:moods[feel]||null,note};
    await dbSavePhoto(entry);
    onSave&&onSave(entry);
    setSaving(false);
    onClose();
  }

  if(preview)return<div style={{position:"absolute",inset:0,zIndex:90,background:P.bg,overflowY:"auto",animation:"fadeIn .3s ease"}}>
    <div style={{padding:"52px 16px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <button onClick={()=>setPreview(null)} style={{width:36,height:36,borderRadius:18,border:`1px solid ${P.border}`,background:P.card,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Icon n="arrow" size={16} color={P.text} sw={2}/></button>
      <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:22,fontWeight:500,color:P.text}}>Foto tomada</div>
      <div style={{width:36}}/>
    </div>
    <div style={{margin:"16px 16px 0"}}>
      <img src={preview} alt="" style={{width:"100%",borderRadius:20,border:`1px solid ${P.border}`,display:"block",maxHeight:400,objectFit:"cover"}}/>
    </div>
    <div style={{padding:"14px 16px 0"}}>
      <div style={{fontSize:12,color:P.muted,marginBottom:8,fontWeight:600,letterSpacing:.3,textTransform:"uppercase"}}>¿Cómo está tu piel hoy?</div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {["😍","🙂","😊","😌","😟"].map(e=><button key={e} onClick={()=>setFeel(e)} style={{flex:1,height:44,borderRadius:12,border:`1.5px solid ${feel===e?P.accent:P.border}`,background:feel===e?P.accentSoft:P.card,fontSize:22,cursor:"pointer",transition:"all .2s"}}>{e}</button>)}
      </div>
      <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Nota opcional (rojez, piel sensible, etc)..." style={{width:"100%",boxSizing:"border-box",padding:12,borderRadius:14,border:`1px solid ${P.border}`,background:P.card,color:P.text,fontSize:13,resize:"none",outline:"none",minHeight:60,marginBottom:12}}/>
      <button onClick={handleSave} disabled={saving} style={{width:"100%",height:52,borderRadius:16,border:"none",background:P.text,color:P.onDark,fontSize:15,fontWeight:600,cursor:"pointer"}}>
        {saving?"Guardando...":"Guardar en mi diario"}
      </button>
    </div>
    <div style={{height:40}}/>

// ─── HISTORY SCREEN ──────────────────────────────
function HistoryScreen({history,streak,phase}){
  const today=todayStr();
  const last14=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last14.push(d.toISOString().split("T")[0]);}
  const byDate={};
  history.forEach(s=>{if(!byDate[s.date])byDate[s.date]={m:0,r:0,n:0};
    if(s.routine==="morning")byDate[s.date].m=1;
    else if(s.routine==="pm_retinal")byDate[s.date].r=1;
    else byDate[s.date].n=1;
  });
  const w1=last14.slice(0,7),w2=last14.slice(7);
  const dayLetters=["L","M","X","J","V","S","D"];
  const cell=(ds)=>{
    const dObj=byDate[ds]||{};
    const isT=ds===today;
    const d=new Date(ds+"T12:00:00");
    const dow=d.getDay()===0?6:d.getDay()-1;
    const letter=dayLetters[dow];
    const isRet=isRetinalDay(phase);
    const hasData=dObj.m||dObj.r||dObj.n;
    return<div key={ds} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
      <div style={{fontSize:9.5,color:P.muted,fontWeight:700,letterSpacing:.3}}>{letter}</div>
      <div style={{width:30,height:30,borderRadius:15,position:"relative",border:isT?`2px solid ${P.accent}`:`1px solid ${P.border}`,background:!hasData?P.cream:P.card,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        {dObj.m&&<div style={{position:"absolute",top:0,left:0,right:0,height:"50%",background:P.accentSoft}}/>}
        {(dObj.r||dObj.n)&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:"50%",background:dObj.r?"#fcc":P.text,opacity:dObj.r?.7:.6}}/>}
        {isT&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}><div style={{width:6,height:6,borderRadius:3,background:P.accent}}/></div>}
      </div>
      <div style={{fontSize:9,color:P.muted,textAlign:"center"}}>{d.getDate()}</div>
    </div>;
  };
  const totalSessions=history.length;
  const amSessions=history.filter(s=>s.routine==="morning").length;
  const retSessions=history.filter(s=>s.routine==="pm_retinal").length;

  // Weekly retinal schedule for ALL 7 days
  const dayNames=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
  const dowToRetinal=(phase===1)?[1,4]:[1,3,5]; // 1=Mon...7=Sun (using JS style 0=Sun adjusted)
  const daySchedule=[1,2,3,4,5,6,0].map((jsDay,i)=>({
    name:dayNames[i],
    retinal:dowToRetinal.includes(jsDay),
  }));

  return<div>
    <div style={{padding:"56px 20px 14px"}}>
      <div style={{fontSize:12,color:P.muted,letterSpacing:.3,marginBottom:2}}>Tu evolución</div>
      <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:30,fontWeight:500,color:P.text,letterSpacing:"-.6px"}}>Historial</div>
    </div>
    <div style={{margin:"0 16px 14px",padding:18,borderRadius:22,background:P.text,color:P.onDark,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",right:-30,top:-40,width:150,height:150,borderRadius:75,background:P.accent,filter:"blur(55px)",opacity:.5}}/>
      <div style={{position:"relative",zIndex:1}}>
        <div style={{fontSize:10,letterSpacing:1.3,textTransform:"uppercase",opacity:.6,marginBottom:6,fontWeight:600}}>Racha actual</div>
        <div style={{display:"flex",alignItems:"baseline",gap:8}}>
          <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:46,fontWeight:500,lineHeight:1,letterSpacing:-1}}>{streak}</div>
          <div style={{fontSize:14,opacity:.7}}>días seguidos 🔥</div>
        </div>
        <div style={{fontSize:12,opacity:.65,marginTop:6}}>Meta: 30 días · ¡tú puedes, Mijal!</div>
      </div>
    </div>
    <div style={{margin:"0 16px 14px",padding:"16px",borderRadius:22,background:P.card,border:`1px solid ${P.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:600,color:P.text}}>Últimas 2 semanas</div>
        <div style={{display:"flex",gap:10,fontSize:10,color:P.muted}}>
          <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:P.accentSoft,marginRight:3}}/>AM</span>
          <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:P.text,opacity:.7,marginRight:3}}/>PM</span>
        </div>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:6}}>{w1.map(d=>cell(d))}</div>
      <div style={{display:"flex",gap:4}}>{w2.map(d=>cell(d))}</div>
    </div>
    <div style={{margin:"0 16px 14px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
      {[{v:totalSessions,l:"Sesiones"},{v:amSessions,l:"☀️ Mañanas"},{v:retSessions,l:"🔴 Retinal"}].map(s=>
        <div key={s.l} style={{padding:"12px 10px",borderRadius:16,background:P.card,border:`1px solid ${P.border}`,textAlign:"center"}}>
          <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:24,fontWeight:500,color:P.text}}>{s.v}</div>
          <div style={{fontSize:10,color:P.muted,marginTop:2}}>{s.l}</div>
        </div>
      )}
    </div>
    <div style={{margin:"0 16px 14px",padding:"16px",borderRadius:22,background:P.card,border:`1px solid ${P.border}`}}>
      <div style={{fontSize:14,fontWeight:600,color:P.text,marginBottom:12}}>Plan semanal completo</div>
      {daySchedule.map((d,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<6?`1px solid ${P.border}`:"none"}}>
        <div style={{fontSize:14,fontWeight:500,color:P.text}}>{d.name}</div>
        <div style={{display:"flex",gap:6}}>
          <span style={{fontSize:11,padding:"3px 10px",borderRadius:8,background:P.accentSoft,color:P.accent,fontWeight:600}}>☀️ AM siempre</span>
          <span style={{fontSize:11,padding:"3px 10px",borderRadius:8,background:d.retinal?P.retinalSoft:P.cream,color:d.retinal?P.retinal:P.muted,fontWeight:600}}>{d.retinal?"🔴 Retinal":"⚪ Sin retinal"}</span>
        </div>
      </div>)}
      <div style={{marginTop:10,padding:"10px 12px",borderRadius:12,background:P.greenSoft,fontSize:12,color:P.green,lineHeight:1.5,fontWeight:500}}>
        ✅ La rutina base (limpieza, tónico, hidratante, SPF) se usa <strong>todos los días</strong> sin excepción. Solo el retinal cambia según el día.
      </div>
    </div>
    <div style={{height:110}}/>
  </div>;
}

function TabBar({tab,onTab}){
  const items=[{id:"today",l:"Hoy",n:"drop"},{id:"history",l:"Historial",n:"calendar"},{id:"diary",l:"Diario",n:"book"},{id:"progress",l:"Progreso",n:"chart"}];
  return<div style={{position:"absolute",left:12,right:12,bottom:24,zIndex:30,borderRadius:26,background:P.card,border:`1px solid ${P.border}`,boxShadow:`0 10px 28px -8px ${P.shadow}`,display:"flex",padding:5}}>
    {items.map(it=>{const a=tab===it.id;return<button key={it.id} onClick={()=>onTab(it.id)} style={{flex:1,height:52,borderRadius:21,border:"none",background:a?P.text:"transparent",color:a?P.onDark:P.muted,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,cursor:"pointer",transition:"all .25s"}}>
      <Icon n={it.n} size={18} color={a?P.onDark:P.muted}/>
      <div style={{fontSize:9.5,fontWeight:600,letterSpacing:.3}}>{it.l}</div>
    </button>;})}
  </div>;
}

// ─── APP ─────────────────────────────────────────
function App(){
  const [tab,setTab]=React.useState("today");
  const [mode,setMode]=React.useState(()=>{
    const h=new Date().getHours();
    return h>=18||h<6?"night":"morning";
  });
  const [phase,setPhase]=React.useState(()=>parseInt(ls("kb_phase","2")));
  const [activeIdx,setActiveIdx]=React.useState(null);
  const [doneSteps,setDoneSteps]=React.useState(new Set());
  const [showMood,setShowMood]=React.useState(false);
  const [moodOfSession,setMoodOfSession]=React.useState(null);
  const [showComplete,setShowComplete]=React.useState(false);
  const [showCamera,setShowCamera]=React.useState(false);
  const [history,setHistory]=React.useState(()=>ls("kb_history",[]));
  const [diary,setDiary]=React.useState(()=>ls("kb_diary",[]));
  const [photos,setPhotos]=React.useState([]);
  const [started,setStarted]=React.useState(false);

  // Load photos from IndexedDB
  React.useEffect(()=>{dbGetPhotos().then(p=>setPhotos(p||[]));},[]);

  const routine=ROUTINES[mode]||ROUTINES.night;
  const streak=getStreak(history);
  const completedCount=routine.steps.filter(s=>doneSteps.has(s.id)).length;
  const completedMin=routine.steps.filter(s=>doneSteps.has(s.id)).reduce((a,s)=>a+s.min,0);
  const isFinished=completedCount===routine.steps.length&&routine.steps.length>0;

  function handleSetMode(m){setMode(m);setDoneSteps(new Set());setActiveIdx(null);setStarted(false);}
  React.useEffect(()=>{setDoneSteps(new Set());setActiveIdx(null);setStarted(false);},[mode]);

  function stepState(s,i){return doneSteps.has(s.id)?"done":i===activeIdx?"active":"pending";}

  function handleTap(i){
    if(!started&&i===0&&!doneSteps.has(routine.steps[0].id)){
      setShowMood(true);
      setStarted(true);
      return;
    }
    setActiveIdx(i);
  }

  function handleMoodDone(mood){
    setMoodOfSession(mood);
    setShowMood(false);
    setActiveIdx(0);
  }

  function handleComplete(s,i){
    haptic("medium");
    const next=new Set(doneSteps);next.add(s.id);setDoneSteps(next);
    const nextIdx=routine.steps.findIndex((st,ii)=>ii>i&&!next.has(st.id));
    if(nextIdx===-1){setActiveIdx(null);setTimeout(()=>setShowComplete(true),350);}
    else setActiveIdx(nextIdx);
  }

  function handleSkip(s,i){
    const nextIdx=routine.steps.findIndex((st,ii)=>ii>i&&!doneSteps.has(st.id));
    setActiveIdx(nextIdx===-1?null:nextIdx);
  }

  function handleCompleteClose(){
    const rKey=mode==="morning"?"morning":mode==="nightRetinal"?"pm_retinal":"pm_normal";
    const today=todayStr();
    const session={date:today,time:new Date().toTimeString().slice(0,5),routine:rKey,steps:completedCount};
    const newH=[...history,session];
    setHistory(newH);lsSet("kb_history",newH);
    // Save mood to diary
    if(moodOfSession){
      const entry={date:today,time:session.time,routine:rKey,feel:moodOfSession,note:""};
      const newD=[...diary,entry];setDiary(newD);lsSet("kb_diary",newD);
    }
    setShowComplete(false);setDoneSteps(new Set());setActiveIdx(null);setStarted(false);setMoodOfSession(null);
  }

  function handlePhotoSave(entry){
    setPhotos(prev=>[...prev,entry]);
  }

  return<div style={{width:"100%",height:"100%",background:P.bg,position:"relative",overflow:"hidden"}}>
    <div style={{height:"100%",overflowY:"auto",paddingBottom:110,WebkitOverflowScrolling:"touch"}}>
      {tab==="today"&&<TodayScreen mode={mode} setMode={handleSetMode} routine={routine} stepState={stepState} onTap={handleTap} onComplete={handleComplete} onSkip={handleSkip} completedCount={completedCount} completedMin={completedMin} isFinished={isFinished} onShowComplete={()=>setShowComplete(true)} streak={streak} phase={phase}/>}
      {tab==="history"&&<HistoryScreen history={history} streak={streak} phase={phase}/>}
      {tab==="diary"&&<DiaryScreen diary={diary} photos={photos} onAddPhoto={()=>setShowCamera(true)}/>}
      {tab==="progress"&&<ProgressScreen history={history} streak={streak}/>}
    </div>
    <TabBar tab={tab} onTab={setTab}/>
    {showMood&&<MoodCheck onDone={handleMoodDone}/>}
    {showComplete&&<CompleteSheet stats={{completed:completedCount,total:routine.steps.length,minutes:Math.round(completedMin),streak}} onPhoto={()=>{setShowComplete(false);setTimeout(()=>setShowCamera(true),200);}} onClose={handleCompleteClose}/>}
    {showCamera&&<PhotoCapture onClose={()=>setShowCamera(false)} onSave={handlePhotoSave}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});</script>
</body>
</html>
