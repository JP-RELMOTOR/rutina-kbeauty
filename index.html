// ─── STORAGE HELPERS ────────────────────────────
function saveHistory(h){ localStorage.setItem("kb_history",JSON.stringify(h)); }
function saveDiary(d){ localStorage.setItem("kb_diary",JSON.stringify(d)); }
function getStreak(history){
  const dates=[...new Set(history.map(s=>s.date))].sort().reverse();
  if(!dates.length) return 0;
  let streak=0,today=new Date().toISOString().split("T")[0];
  let check=today;
  for(const d of dates){
    if(d===check){streak++;const dt=new Date(check);dt.setDate(dt.getDate()-1);check=dt.toISOString().split("T")[0];}
    else if(d<check) break;
  }
  return streak;
}

// ─── PROGRESS RING ──────────────────────────────
function ProgressRing({pct=0,size=64,stroke=4,color=P.text,track=P.cream,children}){
  const r=(size-stroke)/2,c=2*Math.PI*r;
  return <div style={{width:size,height:size,position:"relative"}}>
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} stroke={track} strokeWidth={stroke} fill="none"/>
      <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
        strokeDasharray={c} strokeDashoffset={c*(1-pct)} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 0.4s ease"}}/>
    </svg>
    {children&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{children}</div>}
  </div>;
}

// ─── STEP CARD ──────────────────────────────────
function StepCard({step,idx,state,onTap,onComplete,onSkip}){
  const isActive=state==="active",isDone=state==="done";
  const totalSec=Math.round(step.min*60);
  const [secLeft,setSecLeft]=React.useState(totalSec);
  const [running,setRunning]=React.useState(false);
  React.useEffect(()=>{ if(isActive){setSecLeft(totalSec);setRunning(true);}else setRunning(false);},[isActive,totalSec]);
  React.useEffect(()=>{ if(!running||secLeft<=0) return; const id=setInterval(()=>setSecLeft(s=>Math.max(0,s-1)),1000); return()=>clearInterval(id);},[running,secLeft]);
  const pct=isActive?1-secLeft/totalSec:0;
  const mm=String(Math.floor(secLeft/60)).padStart(2,"0");
  const ss=String(secLeft%60).padStart(2,"0");
  const base={background:P.card,borderRadius:22,marginBottom:10,border:`1px solid ${P.border}`,cursor:isActive?"default":"pointer",position:"relative",overflow:"hidden",transition:"all 0.35s cubic-bezier(0.2,0.8,0.2,1)"};
  const numBubble=<div style={{width:36,height:36,borderRadius:18,background:isDone?P.accent:isActive?P.accentSoft:P.cream,color:isDone?P.cardOnAccent:P.text,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:600,flexShrink:0,border:isDone?"none":`1px solid ${P.border}`}}>
    {isDone?<Icon name="check" size={18} color={P.cardOnAccent} sw={2.5}/>:idx+1}
  </div>;

  if(isDone) return <div style={{...base,padding:"12px 18px",opacity:.55}} onClick={onTap}>
    <div style={{display:"flex",alignItems:"center",gap:14}}>
      {numBubble}
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:10,letterSpacing:1.4,textTransform:"uppercase",color:P.muted,marginBottom:2}}>{step.cat}</div>
        <div style={{fontSize:14,fontWeight:500,color:P.text,textDecoration:"line-through",textDecorationColor:P.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{step.name}</div>
      </div>
      <div style={{fontSize:11,color:P.muted}}>✓ {step.min} min</div>
    </div>
  </div>;

  if(isActive) return <div style={{...base,padding:0,boxShadow:`0 12px 36px -12px ${P.shadow},0 0 0 2px ${P.accent}20`,border:`1.5px solid ${P.accent}`,animation:"stepRise 0.45s cubic-bezier(0.2,0.8,0.2,1)"}}>
    <div style={{padding:"16px 18px 0",display:"flex",alignItems:"flex-start",gap:14}}>
      {numBubble}
      <div style={{flex:1,minWidth:0,paddingTop:1}}>
        <div style={{fontSize:10,letterSpacing:1.4,textTransform:"uppercase",color:P.accent,marginBottom:4,fontWeight:600}}>{step.cat}</div>
        <div style={{fontSize:17,fontFamily:"'Instrument Serif',Georgia,serif",fontWeight:500,color:P.text,lineHeight:1.2,letterSpacing:-0.2}}>{step.name}</div>
        <div style={{fontSize:12,color:P.muted,marginTop:3}}>{step.brand}</div>
      </div>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:16,padding:"16px 18px 0"}}>
      <div style={{width:86,height:110,borderRadius:14,flexShrink:0,background:`linear-gradient(160deg,${step.tone},${step.tone}cc)`,position:"relative",overflow:"hidden",display:"flex",alignItems:"flex-end",justifyContent:"center",border:`1px solid ${P.border}`}}>
        <div style={{position:"absolute",inset:"8% 32%",borderRadius:6,background:"linear-gradient(180deg,rgba(255,255,255,.4),rgba(255,255,255,.05))",border:"1px solid rgba(255,255,255,.5)"}}/>
        <div style={{position:"relative",zIndex:1,fontSize:8,fontFamily:"var(--mono,'JetBrains Mono',monospace)",color:"rgba(255,255,255,.95)",letterSpacing:.5,padding:"4px 8px",background:"rgba(0,0,0,.18)",borderRadius:4,marginBottom:14,textTransform:"uppercase"}}>{step.brand.split(" ")[0]}</div>
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:10,letterSpacing:1.4,textTransform:"uppercase",color:P.muted,marginBottom:8}}>Tiempo recomendado</div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <ProgressRing pct={pct} size={64} stroke={4} color={P.accent} track={P.cream}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:600,color:P.text,letterSpacing:-.5}}>{mm}:{ss}</div>
          </ProgressRing>
          <button onClick={e=>{e.stopPropagation();setRunning(r=>!r);}} style={{width:38,height:38,borderRadius:19,border:`1px solid ${P.border}`,background:P.cream,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:P.text}}>
            <Icon name={running?"pause":"play"} size={14} fill={P.text} color={P.text}/>
          </button>
        </div>
      </div>
    </div>
    <div style={{padding:"14px 18px 0"}}>
      <div style={{background:P.cream,borderRadius:12,padding:"10px 12px",fontSize:13,color:P.text,lineHeight:1.45}}>
        <div style={{fontSize:9,letterSpacing:1.3,textTransform:"uppercase",color:P.muted,marginBottom:4,fontWeight:600}}>Por qué</div>
        {step.why}
      </div>
    </div>
    {step.tip&&<div style={{padding:"10px 18px 0",display:"flex",gap:8,alignItems:"flex-start"}}>
      <div style={{width:4,height:4,borderRadius:2,background:P.accent,marginTop:7,flexShrink:0}}/>
      <div style={{fontSize:12,color:P.muted,fontStyle:"italic",lineHeight:1.4}}>{step.tip}</div>
    </div>}
    <div style={{display:"flex",gap:8,padding:14}}>
      <button onClick={e=>{e.stopPropagation();onSkip();}} style={{flex:1,height:46,borderRadius:14,background:"transparent",border:`1px solid ${P.border}`,color:P.muted,fontSize:14,fontWeight:500,cursor:"pointer"}}>Saltar</button>
      <button onClick={e=>{e.stopPropagation();onComplete();}} style={{flex:2,height:46,borderRadius:14,background:P.text,border:"none",color:P.cardOnText,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,letterSpacing:-.1}}>
        <Icon name="check" size={16} color={P.cardOnText} sw={2.5}/>Listo
      </button>
    </div>
  </div>;

  return <div style={{...base,padding:18}} onClick={onTap}>
    <div style={{display:"flex",alignItems:"center",gap:14}}>
      {numBubble}
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
          <span style={{fontSize:10,letterSpacing:1.4,textTransform:"uppercase",color:P.muted,fontWeight:600}}>{step.cat}</span>
          {step.star&&<span style={{fontSize:9,color:P.accent,background:P.accentSoft,padding:"2px 6px",borderRadius:6,fontWeight:600,letterSpacing:.4}}>CLAVE</span>}
          {step.critical&&<span style={{fontSize:9,color:"#a8511e",background:"#f4d6c1",padding:"2px 6px",borderRadius:6,fontWeight:600,letterSpacing:.4}}>NO SALTES</span>}
        </div>
        <div style={{fontSize:16,fontFamily:"'Instrument Serif',Georgia,serif",fontWeight:500,color:P.text,lineHeight:1.25,letterSpacing:-.2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{step.name}</div>
        <div style={{fontSize:11.5,color:P.muted,marginTop:2}}>{step.brand} · {step.min} min</div>
      </div>
      <Icon name="chevronRight" size={18} color={P.muted}/>
    </div>
  </div>;
}

// ─── MODE TOGGLE ────────────────────────────────
function ModeToggle({mode,onChange}){
  return <div style={{display:"flex",padding:4,borderRadius:14,background:P.cream,border:`1px solid ${P.border}`,margin:"0 16px"}}>
    {[{id:"morning",label:"Mañana",icon:"sun"},{id:"night",label:"Noche",icon:"moon"}].map(o=>{
      const a=mode===o.id;
      return <button key={o.id} onClick={()=>onChange(o.id)} style={{flex:1,height:38,borderRadius:11,border:"none",background:a?P.card:"transparent",color:a?P.text:P.muted,fontSize:13.5,fontWeight:600,letterSpacing:-.1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer",transition:"all 0.2s",boxShadow:a?"0 1px 3px rgba(0,0,0,0.06)":"none"}}>
        <Icon name={o.icon} size={14} color={a?P.text:P.muted}/>{o.label}
      </button>;
    })}
  </div>;
}

// ─── HISTORY SCREEN ──────────────────────────────
function HistoryScreen({history,diary,streak,onAddPhoto}){
  const today=new Date().toISOString().split("T")[0];
  const dates=[...new Set(history.map(s=>s.date))].sort().reverse();
  const last14=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last14.push(d.toISOString().split("T")[0]);}
  const byDate={};history.forEach(s=>{if(!byDate[s.date])byDate[s.date]={m:0,n:0};if(s.routine==="morning")byDate[s.date].m=1;else byDate[s.date].n=1;});
  const w1=last14.slice(0,7),w2=last14.slice(7);
  const days=["L","M","X","J","V","S","D"];
  const totalDays=dates.length;
  const pct=totalDays?Math.round((dates.filter(d=>byDate[d]?.m&&byDate[d]?.n).length/totalDays)*100):0;

  const cell=(ds,i)=>{const dObj=byDate[ds]||{};const m=!!dObj.m,n=!!dObj.n;const isT=ds===today;const dayLetter=days[new Date(ds+"T12:00:00").getDay()===0?6:new Date(ds+"T12:00:00").getDay()-1];
    return <div key={ds} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <div style={{fontSize:10,color:P.muted,letterSpacing:.4,fontWeight:600}}>{dayLetter}</div>
      <div style={{width:30,height:38,borderRadius:9,position:"relative",overflow:"hidden",border:isT?`1.5px solid ${P.accent}`:`1px solid ${P.border}`,background:!m&&!n?P.cream:P.card}}>
        {m&&<div style={{position:"absolute",top:0,left:0,right:0,height:"50%",background:P.accentSoft}}/>}
        {n&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:"50%",background:P.text,opacity:.85}}/>}
        {isT&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:P.accent,fontWeight:700,letterSpacing:.5,zIndex:2}}>HOY</div>}
      </div>
    </div>;
  };

  return <div>
    <div style={{padding:"60px 20px 14px"}}>
      <div style={{fontSize:12,color:P.muted,letterSpacing:.3,marginBottom:2}}>Tu evolución</div>
      <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:30,fontWeight:500,color:P.text,letterSpacing:-.6,lineHeight:1.05}}>Historial</div>
    </div>
    <div style={{margin:"0 16px 14px",padding:18,borderRadius:22,background:`linear-gradient(135deg,${P.text},${P.text}dd)`,color:P.cardOnText,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",right:-30,top:-40,width:160,height:160,borderRadius:80,background:P.accent,filter:"blur(60px)",opacity:.5}}/>
      <div style={{position:"relative",zIndex:1}}>
        <div style={{fontSize:10,letterSpacing:1.4,textTransform:"uppercase",opacity:.65,marginBottom:6,fontWeight:600}}>Racha actual</div>
        <div style={{display:"flex",alignItems:"baseline",gap:8}}>
          <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:44,fontWeight:500,lineHeight:1,letterSpacing:-1}}>{streak}</div>
          <div style={{fontSize:14,opacity:.7}}>días</div>
          <div style={{marginLeft:"auto",fontSize:22}}>🔥</div>
        </div>
        <div style={{fontSize:12,opacity:.7,marginTop:6}}>Meta: 14 días · ¡sigue así!</div>
      </div>
    </div>
    <div style={{margin:"0 16px 14px",padding:"16px 16px 18px",borderRadius:22,background:P.card,border:`1px solid ${P.border}`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:600,color:P.text,letterSpacing:-.1}}>Últimas 2 semanas</div>
        <div style={{display:"flex",gap:10,fontSize:10,color:P.muted}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:P.accentSoft}}/>AM</div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:P.text}}/>PM</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>{w1.map((d,i)=>cell(d,i))}</div>
      <div style={{display:"flex",gap:6}}>{w2.map((d,i)=>cell(d,i))}</div>
    </div>
    <div style={{margin:"0 16px 14px",padding:4,borderRadius:22,background:P.card,border:`1px solid ${P.border}`,display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,overflow:"hidden"}}>
      {[{v:`${pct}%`,l:"Consistencia"},{v:totalDays,l:"Días registrados"},{v:0,l:"Fotos"},{v:`${history.length*14}m`,l:"Tiempo total"}].map((s,i)=>
        <div key={i} style={{padding:14,background:P.card,borderRight:i%2===0?`1px solid ${P.border}`:"none",borderBottom:i<2?`1px solid ${P.border}`:"none"}}>
          <div style={{fontSize:10,color:P.muted,letterSpacing:.4,textTransform:"uppercase",fontWeight:600,marginBottom:4}}>{s.l}</div>
          <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:26,fontWeight:500,color:P.text,letterSpacing:-.5}}>{s.v}</div>
        </div>
      )}
    </div>
    <div style={{margin:"0 0 14px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px 10px"}}>
        <div style={{fontSize:14,fontWeight:600,color:P.text,letterSpacing:-.1}}>Diario de piel</div>
        <button style={{background:"none",border:"none",color:P.accent,fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Nueva</button>
      </div>
      {diary.length===0?<div style={{margin:"0 16px",padding:"20px",borderRadius:22,background:P.card,border:`1px solid ${P.border}`,textAlign:"center",color:P.muted,fontSize:13}}>Aún no hay notas. Usa "Nueva" para añadir.</div>:
      <div style={{margin:"0 16px",borderRadius:22,background:P.card,border:`1px solid ${P.border}`,overflow:"hidden"}}>
        {diary.map((d,i)=>{const c={good:{bg:"#dde9dd",fg:"#3d6b3d"},warn:{bg:"#f4d6c1",fg:"#a8511e"},normal:{bg:P.cream,fg:P.muted}}[d.tag]||{bg:P.cream,fg:P.muted};
          return <div key={i} style={{padding:"14px 16px",borderBottom:i<diary.length-1?`1px solid ${P.border}`:"none",display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{width:36,height:36,borderRadius:10,flexShrink:0,background:c.bg,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>{d.feel}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:10,color:P.muted,marginBottom:3,letterSpacing:.3,fontWeight:600,textTransform:"uppercase"}}>{d.date}</div>
              <div style={{fontSize:13.5,color:P.text,lineHeight:1.45}}>{d.note}</div>
            </div>
          </div>;
        })}
      </div>}
    </div>
    <div style={{height:100}}/>
  </div>;
}

          <div key={i} style={{width:78,height:100,borderRadius:14,flexShrink:0,background:`linear-gradient(140deg,${ph.t1},${ph.t2})`,position:"relative",overflow:"hidden",border:`1px solid ${P.border}`}}>
            <svg viewBox="0 0 78 100" style={{position:"absolute",inset:0}}><ellipse cx="39" cy="46" rx="20" ry="28" fill="rgba(0,0,0,.1)"/>{Array.from({length:ph.spots}).map((_,j)=><circle key={j} cx={28+(j*5)%22} cy={36+(j*9)%22} r={1} fill="rgba(80,40,20,.45)"/>)}</svg>
            <div style={{position:"absolute",bottom:4,left:4,fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:"rgba(255,255,255,.95)",background:"rgba(0,0,0,.4)",padding:"1px 5px",borderRadius:3}}>{ph.d}</div>
          </div>
        )}
      </div>
    </div>
    <div style={{padding:"0 16px 14px"}}>
      <div style={{fontSize:14,fontWeight:600,color:P.text,marginBottom:10,letterSpacing:-.1}}>Logros</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {achievements.map(a=><div key={a.id} style={{padding:14,borderRadius:18,background:a.unlocked?P.card:P.cream,border:`1px solid ${P.border}`,opacity:a.unlocked?1:.7}}>
          <div style={{width:36,height:36,borderRadius:18,background:a.unlocked?P.accentSoft:P.card,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:8}}>
            <Icon name={a.icon} size={18} color={a.unlocked?P.accent:P.muted} fill={a.unlocked?P.accent:"none"} sw={1.4}/>
          </div>
          <div style={{fontSize:13,fontWeight:600,color:P.text,lineHeight:1.3,letterSpacing:-.1}}>{a.label}</div>
          {!a.unlocked&&a.progress!=null&&<div style={{marginTop:6,height:4,borderRadius:2,background:P.border,overflow:"hidden"}}><div style={{height:"100%",width:`${a.progress*100}%`,background:P.accent}}/></div>}
        </div>)}
      </div>
    </div>
    <div style={{height:100}}/>
  </div>;
}

// ─── SHELF SCREEN ────────────────────────────────

      <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:30,fontWeight:500,color:P.text,letterSpacing:-.6,lineHeight:1.05}}>Estante</div>

            <div style={{fontSize:11,color:P.muted,marginTop:2}}>{p.brand}</div>

// ─── TAB BAR ─────────────────────────────────────
function TabBar({tab,onTab}){
  const items=[{id:"today",label:"Hoy",icon:"drop"},{id:"history",label:"Historial",icon:"calendar"},{id:"progress",label:"Progreso",icon:"chart"},{id:"shelf",label:"Estante",icon:"bookmark"}];
  return <div style={{position:"absolute",left:12,right:12,bottom:28,zIndex:30,borderRadius:28,background:P.card,border:`1px solid ${P.border}`,boxShadow:`0 12px 30px -8px ${P.shadow}`,display:"flex",padding:6}}>
    {items.map(it=>{const a=tab===it.id;return <button key={it.id} onClick={()=>onTab(it.id)} style={{flex:1,height:50,borderRadius:22,border:"none",background:a?P.text:"transparent",color:a?P.cardOnText:P.muted,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,cursor:"pointer",transition:"all 0.25s"}}>
      <Icon name={it.icon} size={18} color={a?P.cardOnText:P.muted}/>
      <div style={{fontSize:9.5,fontWeight:600,letterSpacing:.3}}>{it.label}</div>
    </button>;})}
  </div>;
}

// ─── APP ─────────────────────────────────────────
function App(){
  const [tab,setTab]=React.useState("today");
  const [mode,setMode]=React.useState("morning");
  const [activeIdx,setActiveIdx]=React.useState(null);
  const [doneSteps,setDoneSteps]=React.useState(new Set());
  const [showComplete,setShowComplete]=React.useState(false);
  const [showCamera,setShowCamera]=React.useState(false);
  const [history,setHistory]=React.useState(DATA.history);
  const [diary,setDiary]=React.useState(DATA.diary);

  React.useEffect(()=>{setDoneSteps(new Set());setActiveIdx(null);},[mode]);

  const streak=getStreak(history);
  const routine=DATA.routines[mode];
  const completedCount=routine.steps.filter(s=>doneSteps.has(s.id)).length;
  const completedMin=routine.steps.filter(s=>doneSteps.has(s.id)).reduce((a,s)=>a+s.min,0);
  const isFinished=completedCount===routine.steps.length;

  const stepState=(s,i)=>doneSteps.has(s.id)?"done":i===activeIdx?"active":"pending";
  const onTap=(i)=>setActiveIdx(i);
  const onComplete=(s,i)=>{
    const next=new Set(doneSteps);next.add(s.id);setDoneSteps(next);
    const nextIdx=routine.steps.findIndex((st,ii)=>ii>i&&!next.has(st.id));
    if(nextIdx===-1){setActiveIdx(null);setTimeout(()=>setShowComplete(true),350);}
    else setActiveIdx(nextIdx);
  };
  const onSkip=(s,i)=>{const nextIdx=routine.steps.findIndex((st,ii)=>ii>i&&!doneSteps.has(st.id));setActiveIdx(nextIdx===-1?null:nextIdx);};

  const handleCompleteClose=()=>{
    const today=new Date().toISOString().split("T")[0];
    const session={date:today,time:new Date().toTimeString().slice(0,5),routine:mode,steps:completedCount};
    const newH=[...history,session];setHistory(newH);saveHistory(newH);
    setShowComplete(false);setDoneSteps(new Set());setActiveIdx(null);
  };

  const handleSaveDiary=(feel,note)=>{
    if(!feel&&!note){setShowCamera(false);return;}
    const moods={great:"😍",good:"🙂",meh:"😐",bad:"😬"};
    const entry={date:"Hoy",feel:moods[feel]||"🙂",note:note||"Foto tomada.",tag:feel==="bad"?"warn":feel==="great"?"good":"normal"};
    const newD=[entry,...diary].slice(0,20);setDiary(newD);saveDiary(newD);
    setShowCamera(false);
  };

  return <div style={{width:"100%",height:"100%",background:P.bg,color:P.text,position:"relative",overflow:"hidden"}}>
    <div style={{height:"100%",overflowY:"auto",paddingBottom:110,scrollbarWidth:"none"}}>
      {tab==="today"&&<TodayScreen mode={mode} setMode={setMode} routine={routine} stepState={stepState} onTap={onTap} onComplete={onComplete} onSkip={onSkip} completedCount={completedCount} completedMin={completedMin} isFinished={isFinished} onShowComplete={()=>setShowComplete(true)} streak={streak}/>}
      {tab==="history"&&<HistoryScreen history={history} diary={diary} streak={streak} onAddPhoto={()=>setShowCamera(true)}/>}
      {tab==="progress"&&<ProgressScreen achievements={DATA.achievements} onAddPhoto={()=>setShowCamera(true)}/>}
      {tab==="shelf"&&<ShelfScreen products={DATA.products}/>}
    </div>
    <TabBar tab={tab} onTab={setTab}/>
    {showComplete&&<CompleteSheet stats={{completed:completedCount,total:routine.total,minutes:Math.round(completedMin),streak}} onPhoto={()=>{setShowComplete(false);setShowCamera(true);}} onClose={handleCompleteClose}/>}
    {showCamera&&<PhotoCaptureScreen onClose={()=>setShowCamera(false)} onSave={handleSaveDiary}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
