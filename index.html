// ─── INDEXEDDB (PHOTOS) ─────────────────────────
let _db=null;
async function getDB(){
  if(_db) return _db;
  return new Promise((res,rej)=>{
    const r=indexedDB.open("kbeauty_mijal",1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains("photos"))
        d.createObjectStore("photos",{keyPath:"id",autoIncrement:true});
    };
    r.onsuccess=e=>{_db=e.target.result;res(_db);};
    r.onerror=()=>res(null);
  });
}
async function dbSavePhoto(photo){
  const db=await getDB(); if(!db) return;
  return new Promise(res=>{
    const tx=db.transaction("photos","readwrite");
    tx.objectStore("photos").add(photo);
    tx.oncomplete=()=>res(true);
  });
}
async function dbGetPhotos(){
  const db=await getDB(); if(!db) return [];
  return new Promise(res=>{
    const tx=db.transaction("photos","readonly");
    const req=tx.objectStore("photos").getAll();
    req.onsuccess=()=>res(req.result||[]);
    req.onerror=()=>res([]);
  });
}
async function dbDeletePhoto(id){
  const db=await getDB(); if(!db||id==null) return false;
  return new Promise(res=>{
    const tx=db.transaction("photos","readwrite");
    tx.objectStore("photos").delete(id);
    tx.oncomplete=()=>res(true);
    tx.onerror=()=>res(false);
  });
}
async function dbClearPhotos(){
  const db=await getDB(); if(!db) return;
  return new Promise(res=>{
    const tx=db.transaction("photos","readwrite");
    tx.objectStore("photos").clear();
    tx.oncomplete=()=>res(true);
    tx.onerror=()=>res(false);
  });
}
async function dbBulkAddPhotos(arr){
  const db=await getDB(); if(!db) return;
  return new Promise(res=>{
    const tx=db.transaction("photos","readwrite");
    const store=tx.objectStore("photos");
    (arr||[]).forEach(p=>{const c={...p};delete c.id;store.add(c);});
    tx.oncomplete=()=>res(true);
    tx.onerror=()=>res(false);
  });
}
// Read EXIF DateTimeOriginal from a JPEG file. Returns "YYYY-MM-DD" or null.
// Pure JS, no library — parses JPEG markers + TIFF directly. Handles both endian.
async function readExifDate(file){
  try{
    const buf=await file.slice(0,131072).arrayBuffer();
    const view=new DataView(buf);
    if(view.getUint16(0)!==0xFFD8)return null; // not JPEG
    let offset=2;
    while(offset<view.byteLength-2){
      const marker=view.getUint16(offset);
      offset+=2;
      if(marker===0xFFE1){
        const segLen=view.getUint16(offset);offset+=2;
        if(view.byteLength<offset+6){return null;}
        // Check "Exif\0\0"
        if(view.getUint8(offset)!==0x45||view.getUint8(offset+1)!==0x78||view.getUint8(offset+2)!==0x69||view.getUint8(offset+3)!==0x66)continue;
        const tiffStart=offset+6;
        const le=view.getUint16(tiffStart)===0x4949;
        const g16=o=>view.getUint16(o,le),g32=o=>view.getUint32(o,le);
        const ifd0=tiffStart+g32(tiffStart+4);
        const n0=g16(ifd0);
        for(let i=0;i<n0;i++){
          const e=ifd0+2+i*12;
          if(g16(e)===0x8769){
            const exifIfd=tiffStart+g32(e+8);
            const n1=g16(exifIfd);
            for(let j=0;j<n1;j++){
              const ee=exifIfd+2+j*12;
              const tag=g16(ee);
              if(tag===0x9003||tag===0x9004){
                const valOff=tiffStart+g32(ee+8);
                let str="";
                for(let k=0;k<19&&valOff+k<view.byteLength;k++){
                  const c=view.getUint8(valOff+k);
                  if(c===0)break;
                  str+=String.fromCharCode(c);
                }
                const m=str.match(/^(\d{4}):(\d{2}):(\d{2})/);
                if(m)return `${m[1]}-${m[2]}-${m[3]}`;
              }
            }
            return null;
          }
        }
        return null;
      }else{
        if(marker===0xFFD9||marker===0xFFDA)return null;
        const segLen=view.getUint16(offset);offset+=segLen;
      }
    }
  }catch(_){}
  return null;
}

// Compress an image file to a JPEG data URL (max 900px on long edge, 72% quality).
function compressImage(file){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const MAX=900,ratio=Math.min(MAX/img.width,MAX/img.height,1);
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        res(canvas.toDataURL("image/jpeg",.72));
      };
      img.onerror=()=>res(null);
      img.src=ev.target.result;
    };
    reader.onerror=()=>res(null);
    reader.readAsDataURL(file);
  });
}

async function getStorageEstimate(){
  try{
    if(navigator.storage&&navigator.storage.estimate){
      const e=await navigator.storage.estimate();
      return {used:e.usage||0,quota:e.quota||0};
    }
  }catch(_){}
  return {used:0,quota:0};
}

  const d=getDOW();

// Backup reminder cada 2 semanas (día 1 y día 15 de cada mes). Persistido para no repetirse el mismo día.
function shouldShowBackupReminder(){
  const today=todayStr();
  const day=parseInt(today.slice(-2),10);
  if(day!==1&&day!==15)return false;
  return ls("kb_last_backup_reminder","")!==today;
}

// Streak con "comodines": hasta 2 días salteados al mes que NO rompen la racha.
// (Como Duolingo streak freezes — auto-aplicados, no requiere tap.)
const MAX_FREEZES_PER_MONTH=2;
function _computeStreakInfo(hist){
  const dates=new Set(hist.map(s=>s.date));
  const today=todayStr();
  const currentMonth=today.slice(0,7);
  if(dates.size===0)return {streak:0,usedThisMonth:0,freezesLeft:MAX_FREEZES_PER_MONTH};
  // El streak no puede ir más atrás que la primera actividad registrada.
  const earliest=[...dates].sort()[0];
  let streak=0,check=today,consecGaps=0;
  const freezesByMonth={};
  for(let i=0;i<400;i++){
    if(check<earliest)break;
    if(dates.has(check)){streak++;consecGaps=0;}
    else if(check===today){consecGaps=0;}
    else{
      consecGaps++;
      if(consecGaps>1)break;
      const m=check.slice(0,7);
      const used=freezesByMonth[m]||0;
      if(used>=MAX_FREEZES_PER_MONTH)break;
      freezesByMonth[m]=used+1;
      streak++;
    }
    const dt=new Date(check+"T12:00:00");dt.setDate(dt.getDate()-1);
    check=dt.toISOString().split("T")[0];
  }
  const usedThisMonth=freezesByMonth[currentMonth]||0;
  return {streak,usedThisMonth,freezesLeft:Math.max(0,MAX_FREEZES_PER_MONTH-usedThisMonth)};
}
function getStreak(hist){return _computeStreakInfo(hist).streak;}
function getFreezeInfo(hist){return _computeStreakInfo(hist);}

function findIngredient(name){
  if(!name)return null;
  const low=name.toLowerCase();
  return INGREDIENTS.find(i=>low.includes(i.key))||null;
}

// Aggrega productos únicos desde las 3 rutinas (mismo producto puede aparecer en varias)
function getUniqueProducts(){
  const seen=new Map();
  Object.values(ROUTINES).forEach(r=>{
    r.steps.forEach(step=>{
      const key=`${step.brand}|${step.name}`;
      if(!seen.has(key)){
        seen.set(key,{
          name:step.name,
          brand:step.brand,
          photo:step.photo,
          cat:step.cat,
          ingr:step.ingr,
          appearances:[],
        });
      }
      seen.get(key).appearances.push({
        routineId:r.id,
        routineLabel:r.label,
        cat:step.cat,
        why:step.why,
        tip:step.tip,
        min:step.min,
        critical:!!step.critical,
        star:!!step.star,
      });
    });
  });
  return [...seen.values()];
}

        </div>
        <div style={{fontSize:12,color:P.muted,lineHeight:1.5,paddingLeft:22}}>{a.why}</div>
      </div>)}
    </div>

    <div style={{height:120}}/>
  </div>;
}

function getTipOfTheDay(){
  // Deterministic: same day → same tip. Rotates daily.
  const d=new Date();
  const seed=Math.floor(d.getTime()/(1000*60*60*24));
  return TIPS[seed%TIPS.length];
}

// ─── RING ────────────────────────────────────────
function Ring({pct=0,size=60,stroke=4,color=P.text,track=P.cream,children}){
  const r=(size-stroke)/2,c=2*Math.PI*r;
  return<div style={{width:size,height:size,position:"relative"}}>
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} stroke={track} strokeWidth={stroke} fill="none"/>
      <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
        strokeDasharray={c} strokeDashoffset={c*(1-pct)} strokeLinecap="round"
        style={{transition:"stroke-dashoffset .4s ease"}}/>
    </svg>
    {children&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{children}</div>}
  </div>;
}

      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const MAX=900,ratio=Math.min(MAX/img.width,MAX/img.height);
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        setPreview(canvas.toDataURL("image/jpeg",.72));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  }

    if(!preview)return;
    setSaving(true);
    const moods={"😍":"Radiante","🙂":"Bien","😊":"Normal","😌":"Sensible","😟":"Irritada"};

    <div style={{padding:"14px 16px 0"}}>

      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {["😍","🙂","😊","😌","😟"].map(e=><button key={e} onClick={()=>setFeel(e)} style={{flex:1,height:44,borderRadius:12,border:`1.5px solid ${feel===e?P.accent:P.border}`,background:feel===e?P.accentSoft:P.card,fontSize:22,cursor:"pointer",transition:"all .2s"}}>{e}</button>)}

      <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Nota opcional (rojez, piel sensible, etc)..." style={{width:"100%",boxSizing:"border-box",padding:12,borderRadius:14,border:`1px solid ${P.border}`,background:P.card,color:P.text,fontSize:13,resize:"none",outline:"none",minHeight:60,marginBottom:12}}/>

// ─── IMPORT PHOTOS (from iPhone Photos Library) ──
function ImportPhotos({onClose,onSave}){
  const inputRef=React.useRef();
  const [files,setFiles]=React.useState([]); // [{preview, date, dateAuto, note}]
  const [loading,setLoading]=React.useState(false);
  const [saving,setSaving]=React.useState(false);

  // Open native picker on mount
  React.useEffect(()=>{
    setTimeout(()=>inputRef.current?.click(),200);
  },[]);

  async function handlePick(e){
    const list=Array.from(e.target.files||[]);
    if(!list.length){onClose();return;}
    setLoading(true);
    const out=[];
    for(const f of list){
      const [exifDate,preview]=await Promise.all([readExifDate(f),compressImage(f)]);
      if(!preview)continue;
      const fallback=todayStr();
      out.push({
        preview,
        date:exifDate||fallback,
        dateAuto:!!exifDate,
        note:"",
      });
    }
    // Sort by date ascending (oldest first) for visual flow
    out.sort((a,b)=>a.date.localeCompare(b.date));
    setFiles(out);
    setLoading(false);
  }

  function updateField(idx,field,value){
    setFiles(prev=>prev.map((f,i)=>i===idx?{...f,[field]:value,...(field==="date"?{dateAuto:false}:{})}:f));
  }
  function removeOne(idx){
    setFiles(prev=>prev.filter((_,i)=>i!==idx));
  }
  function setBulkDate(d){
    setFiles(prev=>prev.map(f=>({...f,date:d,dateAuto:false})));
  }

  async function handleSave(){
    if(!files.length)return;
    setSaving(true);
    for(const f of files){
      const entry={
        date:f.date,
        time:"12:00",
        dataUrl:f.preview,
        feel:null,
        feelLabel:null,
        note:f.note||"",
        imported:true,
      };
      await dbSavePhoto(entry);
    }
    setSaving(false);
    onSave&&onSave(files.length);
    onClose();
  }

  return<div style={{position:"absolute",inset:0,zIndex:90,background:P.bg,overflowY:"auto",animation:"fadeIn .3s ease",WebkitOverflowScrolling:"touch"}}>
    <input ref={inputRef} type="file" accept="image/*" multiple onChange={handlePick} style={{display:"none"}}/>

    <div style={{padding:"52px 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,position:"sticky",top:0,background:P.bg,zIndex:2,borderBottom:files.length?`1px solid ${P.border}`:"none"}}>
      <button onClick={onClose} style={{width:36,height:36,borderRadius:18,border:`1px solid ${P.border}`,background:P.card,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Icon n="arrow" size={16} color={P.text} sw={2}/></button>
      <div style={{flex:1,textAlign:"center"}}>
        <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:20,fontWeight:500,color:P.text}}>Importar fotos</div>
        {files.length>0&&<div style={{fontSize:11,color:P.muted,marginTop:1}}>{files.length} foto{files.length!==1?"s":""} · revisa fechas</div>}
      </div>
      <div style={{width:36}}/>
    </div>

    {loading&&<div style={{padding:"60px 20px",textAlign:"center"}}>
      <div style={{fontSize:13,color:P.muted}}>Leyendo fechas de las fotos...</div>
    </div>}

    {!loading&&files.length===0&&<div style={{padding:"40px 20px",textAlign:"center"}}>
      <div style={{fontSize:13,color:P.muted,marginBottom:14}}>Abriendo fototeca...</div>
      <button onClick={()=>inputRef.current?.click()} style={{padding:"10px 16px",borderRadius:12,border:`1px solid ${P.border}`,background:P.card,cursor:"pointer",fontSize:13}}>Reintentar selección</button>
    </div>}

    {!loading&&files.length>0&&<>
      <div style={{padding:"12px 16px",background:P.cream,fontSize:12,color:P.muted,lineHeight:1.5,borderBottom:`1px solid ${P.border}`}}>
        💡 Las fechas con <span style={{color:P.green,fontWeight:700}}>AUTO</span> vienen del EXIF original de la foto. Las puedes cambiar si están mal.
      </div>

      <div style={{padding:"12px 16px"}}>
        <button onClick={()=>{const d=prompt("Aplicar la misma fecha a TODAS (YYYY-MM-DD):",todayStr());if(d&&/^\d{4}-\d{2}-\d{2}$/.test(d))setBulkDate(d);}} style={{width:"100%",padding:"10px",borderRadius:12,border:`1px dashed ${P.border}`,background:"transparent",color:P.muted,fontSize:12,cursor:"pointer",marginBottom:8}}>Aplicar misma fecha a todas</button>
      </div>

      <div style={{padding:"0 16px 100px"}}>
        {files.map((f,i)=><div key={i} style={{display:"flex",gap:12,padding:"12px",marginBottom:8,borderRadius:16,background:P.card,border:`1px solid ${P.border}`}}>
          <div style={{width:72,height:72,borderRadius:12,overflow:"hidden",flexShrink:0,border:`1px solid ${P.border}`}}>
            <img src={f.preview} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
              <input type="date" value={f.date} onChange={e=>updateField(i,"date",e.target.value)} style={{flex:1,padding:"6px 8px",borderRadius:8,border:`1px solid ${P.border}`,background:P.bg,color:P.text,fontSize:13,fontFamily:"inherit"}}/>
              {f.dateAuto&&<span style={{fontSize:8.5,padding:"2px 6px",borderRadius:5,background:P.greenSoft,color:P.green,fontWeight:700,letterSpacing:.3}}>AUTO</span>}
              <button onClick={()=>removeOne(i)} aria-label="Quitar" style={{width:24,height:24,borderRadius:12,border:"none",background:P.cream,color:P.muted,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
            <input type="text" value={f.note} onChange={e=>updateField(i,"note",e.target.value)} placeholder="Nota opcional..." style={{width:"100%",boxSizing:"border-box",padding:"6px 8px",borderRadius:8,border:`1px solid ${P.border}`,background:P.bg,color:P.text,fontSize:12,fontFamily:"inherit"}}/>
          </div>
        </div>)}
      </div>

      <div style={{position:"fixed",left:0,right:0,bottom:0,padding:"12px 16px 28px",background:`linear-gradient(180deg,rgba(246,239,226,0),${P.bg} 30%)`,zIndex:3}}>
        <button onClick={handleSave} disabled={saving||files.length===0} style={{width:"100%",height:54,borderRadius:18,border:"none",background:saving?P.muted:P.text,color:P.onDark,fontSize:15,fontWeight:600,cursor:saving?"default":"pointer"}}>{saving?"Guardando...":`Guardar ${files.length} foto${files.length!==1?"s":""} ✓`}</button>
      </div>
    </>}
  </div>;
}

    </div>
    {/* Step dots */}
    <div style={{display:"flex",gap:5,justifyContent:"center",padding:"0 16px 10px"}}>
      {routine.steps.map((s,i)=>{
        const done=doneSteps.has(s.id);
        const active=i===routine.steps.findIndex((_,ii)=>!doneSteps.has(routine.steps[ii].id));
        return<div key={s.id} style={{width:done?18:active?18:8,height:8,borderRadius:4,background:done?P.green:active?P.accent:P.cream,border:`1px solid ${done?P.green:active?P.accent:P.border}`,transition:"all .3s ease"}}/>;
      })}
    </div>
    <div style={{padding:"0 16px"}}>
      {routine.steps.map((s,i)=>{
        const nextReal=routine.steps.slice(i+1).find(st=>!doneSteps.has(st.id));
        return<StepCard key={s.id} step={s} idx={i} state={stepState(s,i)} onTap={()=>onTap(i)} onComplete={()=>onComplete(s,i)} onSkip={()=>onSkip(s,i)} nextName={nextReal?nextReal.name:null} onIngredient={onIngredient}/>;
      })}
    </div>
    {isFinished&&<div style={{padding:"8px 16px"}}>
      <button onClick={onShowComplete} style={{width:"100%",height:54,borderRadius:18,border:"none",background:P.accent,color:P.onAccent,fontSize:15,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <Icon n="sparkle" size={16} color={P.onAccent} fill={P.onAccent} sw={1}/>Registrar rutina completada
      </button>
    </div>}
    <div style={{height:110}}/>
  </div>;
}

// ─── HISTORY SCREEN ──────────────────────────────
function HistoryScreen({history,streak,phase}){
  const freezeInfo=getFreezeInfo(history);
  const today=todayStr();
  const last14=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last14.push(d.toISOString().split("T")[0]);}
  const byDate={};
  history.forEach(s=>{if(!byDate[s.date])byDate[s.date]={m:0,r:0,n:0};
    if(s.routine==="morning")byDate[s.date].m=1;
    else if(s.routine==="pm_retinal")byDate[s.date].r=1;
    else byDate[s.date].n=1;
  });
  const w1=last14.slice(0,7),w2=last14.slice(7);
  const dayLetters=["L","M","X","J","V","S","D"];
  const cell=(ds)=>{
    const dObj=byDate[ds]||{};
    const isT=ds===today;
    const d=new Date(ds+"T12:00:00");
    const dow=d.getDay()===0?6:d.getDay()-1;
    const letter=dayLetters[dow];
    const isRet=isRetinalDay(phase);
    const hasData=dObj.m||dObj.r||dObj.n;
    return<div key={ds} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
      <div style={{fontSize:9.5,color:P.muted,fontWeight:700,letterSpacing:.3}}>{letter}</div>
      <div style={{width:30,height:30,borderRadius:15,position:"relative",border:isT?`2px solid ${P.accent}`:`1px solid ${P.border}`,background:!hasData?P.cream:P.card,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        {dObj.m&&<div style={{position:"absolute",top:0,left:0,right:0,height:"50%",background:P.accentSoft}}/>}
        {(dObj.r||dObj.n)&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:"50%",background:dObj.r?"#fcc":P.text,opacity:dObj.r?.7:.6}}/>}
        {isT&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}><div style={{width:6,height:6,borderRadius:3,background:P.accent}}/></div>}
      </div>
      <div style={{fontSize:9,color:P.muted,textAlign:"center"}}>{d.getDate()}</div>
    </div>;
  };
  const totalSessions=history.length;
  const amSessions=history.filter(s=>s.routine==="morning").length;
  const retSessions=history.filter(s=>s.routine==="pm_retinal").length;

  // Weekly retinal schedule for ALL 7 days
  const dayNames=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
  const dowToRetinal=(phase===1)?[1,4]:[1,3,5]; // 1=Mon...7=Sun (using JS style 0=Sun adjusted)
  const daySchedule=[1,2,3,4,5,6,0].map((jsDay,i)=>({
    name:dayNames[i],
    retinal:dowToRetinal.includes(jsDay),
  }));

  return<div>
    <div style={{padding:"56px 20px 14px"}}>
      <div style={{fontSize:12,color:P.muted,letterSpacing:.3,marginBottom:2}}>Tu evolución</div>
      <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:30,fontWeight:500,color:P.text,letterSpacing:"-.6px"}}>Historial</div>
    </div>
    <div style={{margin:"0 16px 14px",padding:18,borderRadius:22,background:P.text,color:P.onDark,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",right:-30,top:-40,width:150,height:150,borderRadius:75,background:P.accent,filter:"blur(55px)",opacity:.5}}/>
      <div style={{position:"relative",zIndex:1}}>
        <div style={{fontSize:10,letterSpacing:1.3,textTransform:"uppercase",opacity:.6,marginBottom:6,fontWeight:600}}>Racha actual</div>
        <div style={{display:"flex",alignItems:"baseline",gap:8}}>
          <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:46,fontWeight:500,lineHeight:1,letterSpacing:-1}}>{streak}</div>
          <div style={{fontSize:14,opacity:.7}}>días seguidos 🔥</div>
        </div>
        <div style={{fontSize:12,opacity:.65,marginTop:6}}>Meta: 30 días · ¡tú puedes, Mijal!</div>
        <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid rgba(254,252,247,.12)",display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",gap:4}}>
            {[0,1].map(i=><span key={i} style={{fontSize:16,opacity:i<freezeInfo.freezesLeft?1:.25}}>🥶</span>)}
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,opacity:.9}}>{freezeInfo.freezesLeft===2?"Tienes 2 comodines este mes":freezeInfo.freezesLeft===1?"1 comodín disponible":"Sin comodines · 2 nuevos el día 1"}</div>
            <div style={{fontSize:10.5,opacity:.55,marginTop:1}}>Salta un día sin romper la racha (máx 2/mes)</div>
          </div>
        </div>
      </div>
    </div>
    <div style={{margin:"0 16px 14px",padding:"16px",borderRadius:22,background:P.card,border:`1px solid ${P.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:600,color:P.text}}>Últimas 2 semanas</div>
        <div style={{display:"flex",gap:10,fontSize:10,color:P.muted}}>
          <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:P.accentSoft,marginRight:3}}/>AM</span>
          <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:P.text,opacity:.7,marginRight:3}}/>PM</span>

        <div key={s.l} style={{padding:"12px 10px",borderRadius:16,background:P.card,border:`1px solid ${P.border}`,textAlign:"center"}}>
          <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:24,fontWeight:500,color:P.text}}>{s.v}</div>
          <div style={{fontSize:10,color:P.muted,marginTop:2}}>{s.l}</div>
        </div>
      )}
    </div>
    <div style={{margin:"0 16px 14px",padding:"16px",borderRadius:22,background:P.card,border:`1px solid ${P.border}`}}>
      <div style={{fontSize:14,fontWeight:600,color:P.text,marginBottom:12}}>Plan semanal completo</div>
      {daySchedule.map((d,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<6?`1px solid ${P.border}`:"none"}}>
        <div style={{fontSize:14,fontWeight:500,color:P.text}}>{d.name}</div>
        <div style={{display:"flex",gap:6}}>
          <span style={{fontSize:11,padding:"3px 10px",borderRadius:8,background:P.accentSoft,color:P.accent,fontWeight:600}}>☀️ AM siempre</span>
          <span style={{fontSize:11,padding:"3px 10px",borderRadius:8,background:d.retinal?P.retinalSoft:P.cream,color:d.retinal?P.retinal:P.muted,fontWeight:600}}>{d.retinal?"🔴 Retinal":"⚪ Sin retinal"}</span>
        </div>
      </div>)}
      <div style={{marginTop:10,padding:"10px 12px",borderRadius:12,background:P.greenSoft,fontSize:12,color:P.green,lineHeight:1.5,fontWeight:500}}>
        ✅ La rutina base (limpieza, tónico, hidratante, SPF) se usa <strong>todos los días</strong> sin excepción. Solo el retinal cambia según el día.
      </div>
    </div>
    <div style={{height:110}}/>

}

// ─── SKIN JOURNEY TIMELINE ───────────────────────
function SkinJourneySheet({photos,onClose,onOpenPhoto}){
  const sorted=React.useMemo(()=>[...photos].sort((a,b)=>(a.date||"").localeCompare(b.date||"")),[photos]);
  // Pares de comparación útiles: primera vs última, hoy vs 1 mes atrás, hoy vs 3 meses atrás
  const comparisons=React.useMemo(()=>{
    if(sorted.length<2)return [];
    const out=[];
    const latest=sorted[sorted.length-1];
    const first=sorted[0];
    out.push({label:"Primera foto · ahora",a:first,b:latest});
    const findClosest=(targetDate)=>{
      let best=null,bestDiff=Infinity;
      for(const p of sorted){
        const diff=Math.abs(new Date(p.date)-new Date(targetDate));
        if(diff<bestDiff){bestDiff=diff;best=p;}
      }
      return best;
    };
    const latestDt=new Date(latest.date);
    const oneMo=new Date(latestDt);oneMo.setMonth(oneMo.getMonth()-1);
    const threeMo=new Date(latestDt);threeMo.setMonth(threeMo.getMonth()-3);
    if(oneMo>=new Date(first.date)){
      const p=findClosest(oneMo.toISOString().split("T")[0]);
      if(p&&p.date!==latest.date&&p.date!==first.date)out.push({label:"Hace ~1 mes · ahora",a:p,b:latest});
    }
    if(threeMo>=new Date(first.date)){
      const p=findClosest(threeMo.toISOString().split("T")[0]);
      if(p&&p.date!==latest.date&&p.date!==first.date)out.push({label:"Hace ~3 meses · ahora",a:p,b:latest});
    }
    return out;
  },[sorted]);
  // Agrupar por mes para la línea de tiempo
  const byMonth=React.useMemo(()=>{
    const m={};
    sorted.forEach(p=>{const k=p.date?.slice(0,7)||"sin-fecha";(m[k]=m[k]||[]).push(p);});
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
  },[sorted]);
  const monthName=key=>{
    if(key==="sin-fecha")return "Sin fecha";
    const [y,mo]=key.split("-");
    const names=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    return `${names[parseInt(mo)-1]} ${y}`;
  };
  return<div style={{position:"absolute",inset:0,zIndex:82,background:P.bg,overflowY:"auto",animation:"fadeIn .3s ease",WebkitOverflowScrolling:"touch"}}>
    <div style={{padding:"52px 16px 8px",display:"flex",alignItems:"center",gap:10}}>
      <button onClick={onClose} style={{width:36,height:36,borderRadius:18,border:`1px solid ${P.border}`,background:P.card,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Icon n="arrow" size={16} color={P.text} sw={2}/></button>
      <div style={{flex:1}}>
        <div style={{fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:P.accent,fontWeight:700}}>Tu evolución</div>
        <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:24,color:P.text,letterSpacing:"-.4px",lineHeight:1.1}}>Skin Journey</div>
      </div>
    </div>

    {sorted.length<2?<div style={{padding:"60px 24px",textAlign:"center"}}>
      <div style={{fontSize:36,marginBottom:14}}>📸</div>
      <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:18,color:P.text,marginBottom:6}}>Aún no hay suficientes fotos</div>
      <div style={{fontSize:13,color:P.muted,lineHeight:1.5}}>Necesitas al menos 2 fotos para ver tu evolución.<br/>Toma fotos los lunes para construir tu historial.</div>
    </div>:<>

      {/* Comparaciones automáticas */}
      {comparisons.length>0&&<div style={{padding:"6px 16px 14px"}}>
        <div style={{fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:P.muted,fontWeight:700,marginBottom:10,marginTop:8}}>Antes / ahora</div>
        {comparisons.map((c,i)=><div key={i} style={{marginBottom:14,padding:14,borderRadius:20,background:P.card,border:`1px solid ${P.border}`}}>
          <div style={{fontSize:12,color:P.muted,marginBottom:10,fontWeight:600,letterSpacing:.3}}>{c.label}</div>
          <div style={{display:"flex",gap:8}}>
            {[c.a,c.b].map((p,j)=><button key={j} onClick={()=>onOpenPhoto&&onOpenPhoto(p)} style={{flex:1,padding:0,border:"none",background:"none",cursor:"pointer",textAlign:"left"}}>
              <div style={{aspectRatio:"3/4",borderRadius:14,overflow:"hidden",border:`1px solid ${P.border}`,position:"relative"}}>
                <img src={p.dataUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                {j===1&&<div style={{position:"absolute",top:6,right:6,padding:"2px 8px",borderRadius:6,background:P.accent,color:P.onAccent,fontSize:9,fontWeight:700,letterSpacing:.3}}>AHORA</div>}
              </div>
              <div style={{fontSize:10,color:P.muted,marginTop:6,fontFamily:"'JetBrains Mono',monospace",textAlign:"center"}}>{p.date}</div>
              {p.feel&&<div style={{fontSize:14,textAlign:"center",marginTop:2}}>{p.feel}</div>}

              <img src={p.dataUrl} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
              <div style={{position:"absolute",bottom:3,left:3,right:3,background:"rgba(29,24,18,.6)",borderRadius:4,padding:"2px 4px",fontSize:8,color:"white",fontFamily:"'JetBrains Mono',monospace",textAlign:"center"}}>{p.date?.slice(-5)||"--"}</div>
            </button>)}
          </div>
        </div>)}
      </div>
    </>}
  </div>;
}

// ─── WEEKLY RECAP (domingo estilo Wrapped) ───────
function computeWeekStats(history,diary,routines){
  const today=new Date();
  const start=new Date(today);start.setDate(today.getDate()-6);
  const startStr=start.toISOString().split("T")[0];
  const endStr=today.toISOString().split("T")[0];
  const inRange=d=>d>=startStr&&d<=endStr;
  const wkHist=history.filter(h=>inRange(h.date));
  const wkDiary=diary.filter(d=>inRange(d.date));
  // Días con al menos una rutina
  const uniqueDays=new Set(wkHist.map(s=>s.date)).size;
  // Total minutos estimado
  const totalSteps=wkHist.reduce((a,s)=>a+(s.steps||0),0);
  // Avg minutos por rutina (~2 min/paso aprox)
  const totalMin=wkHist.reduce((a,s)=>{
    const r=routines[s.routine==="morning"?"morning":s.routine==="pm_retinal"?"nightRetinal":"night"];
    const stepCount=s.steps||0;
    const avg=r?r.minutes/r.total:2;
    return a+avg*stepCount;
  },0);
  const moodCount={};
  wkDiary.forEach(d=>{if(d.feel)moodCount[d.feel]=(moodCount[d.feel]||0)+1;});
  const topMood=Object.entries(moodCount).sort((a,b)=>b[1]-a[1])[0];
  // AM vs PM split
  const am=wkHist.filter(s=>s.routine==="morning").length;
  const retNights=wkHist.filter(s=>s.routine==="pm_retinal").length;
  const normalNights=wkHist.filter(s=>s.routine==="pm_normal").length;
  // Día con más actividad
  const byDay={};
  wkHist.forEach(s=>{byDay[s.date]=(byDay[s.date]||0)+1;});
  const bestDay=Object.entries(byDay).sort((a,b)=>b[1]-a[1])[0];
  const dayNames={0:"Domingo",1:"Lunes",2:"Martes",3:"Miércoles",4:"Jueves",5:"Viernes",6:"Sábado"};
  let bestDayLabel=null;
  if(bestDay){
    const d=new Date(bestDay[0]+"T12:00:00");
    bestDayLabel=dayNames[d.getDay()];
  }
  return {
    weekStart:startStr,
    weekEnd:endStr,
    totalSessions:wkHist.length,
    uniqueDays,
    totalSteps,
    totalMin:Math.round(totalMin),
    am,retNights,normalNights,
    topMood:topMood?topMood[0]:null,
    topMoodCount:topMood?topMood[1]:0,
    bestDayLabel,bestDayCount:bestDay?bestDay[1]:0,
  };
}
function shouldShowWeeklyRecap(history){
  if(getDOW()!==0)return false; // solo domingo
  const last=ls("kb_last_recap_shown","");
  if(last===todayStr())return false;
  // Solo si tiene actividad esta semana
  const today=new Date();
  const start=new Date(today);start.setDate(today.getDate()-6);
  const startStr=start.toISOString().split("T")[0];
  return history.some(h=>h.date>=startStr);
}
function markRecapShown(){lsSet("kb_last_recap_shown",todayStr());}

  return<div style={{position:"absolute",left:12,right:12,top:"max(12px, env(safe-area-inset-top))",zIndex:70,padding:"12px 14px",borderRadius:18,background:P.text,color:P.onDark,boxShadow:`0 12px 30px -8px ${P.shadow}`,display:"flex",alignItems:"center",gap:12,animation:"slideUp .35s ease"}}>
    <div style={{width:36,height:36,borderRadius:18,background:P.accent,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:18}}>✨</div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:13,fontWeight:600,letterSpacing:"-.1px"}}>Nueva versión disponible</div>
      <div style={{fontSize:11,opacity:.65,marginTop:1}}>Toca para aplicar y recargar</div>
    </div>
    <button onClick={onDismiss} style={{width:30,height:30,borderRadius:15,border:"none",background:"rgba(255,255,255,.12)",color:P.onDark,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon n="close" size={13} color={P.onDark} sw={2}/></button>
    <button onClick={onApply} style={{height:36,padding:"0 14px",borderRadius:12,border:"none",background:P.accent,color:P.onAccent,fontSize:12.5,fontWeight:700,letterSpacing:.3,cursor:"pointer",flexShrink:0}}>Aplicar</button>
  </div>;
}

// ─── EXPORT / IMPORT ─────────────────────────────
async function exportAllData(){
  const photos=await dbGetPhotos();
  const data={
    version:1,
    exportedAt:new Date().toISOString(),
    history:ls("kb_history",[]),
    diary:ls("kb_diary",[]),
    phase:ls("kb_phase","2"),
    photos:photos.map(p=>{const c={...p};delete c.id;return c;}),
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`kbeauty-mijal-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}
async function importAllData(file){
  const text=await file.text();
  const data=JSON.parse(text);
  if(!data||typeof data!=="object")throw new Error("Archivo inválido");
  if(Array.isArray(data.history))lsSet("kb_history",data.history);
  if(Array.isArray(data.diary))lsSet("kb_diary",data.diary);
  if(data.phase!=null)lsSet("kb_phase",data.phase);
  if(Array.isArray(data.photos)){
    await dbClearPhotos();
    await dbBulkAddPhotos(data.photos);
  }
  return data;
}

// ─── SETTINGS SHEET ──────────────────────────────
function SettingsSheet({onClose,history,diary,photos,phase,onPhaseChange,onDataRestored}){
  const fileRef=React.useRef();
  const [stor,setStor]=React.useState({used:0,quota:0});
  const [importing,setImporting]=React.useState(false);
  const [msg,setMsg]=React.useState(null);
  React.useEffect(()=>{getStorageEstimate().then(setStor);},[]);
  const mb=n=>(n/1024/1024).toFixed(1);

  async function handleExport(){
    try{await exportAllData();setMsg({type:"ok",text:"Datos exportados a Descargas / Archivos"});}
    catch(e){setMsg({type:"err",text:"Error al exportar: "+e.message});}
  }
  async function handleImportFile(e){
    const f=e.target.files?.[0];if(!f)return;
    if(!confirm("Esto reemplaza TODOS tus datos actuales con los del archivo. ¿Continuar?"))return;
    setImporting(true);
    try{
      const data=await importAllData(f);
      const n=(data.history?.length||0)+(data.diary?.length||0)+(data.photos?.length||0);
      setMsg({type:"ok",text:`Importados ${n} registros. Recarga la app.`});
      onDataRestored&&onDataRestored();
    }catch(err){setMsg({type:"err",text:"Error: "+err.message});}
    setImporting(false);
  }

  const photoMB=photos.reduce((a,p)=>a+(p.dataUrl?.length||0)*0.75,0)/1024/1024;
  const Row=({label,value})=><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${P.border}`}}>
    <div style={{fontSize:13,color:P.muted}}>{label}</div>
    <div style={{fontSize:13,color:P.text,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{value}</div>
  </div>;

  return<div style={{position:"absolute",inset:0,zIndex:75,background:"rgba(29,24,18,.4)",display:"flex",alignItems:"flex-end"}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxHeight:"92%",overflowY:"auto",background:P.bg,borderRadius:"28px 28px 0 0",padding:"18px 18px 36px",animation:"slideUp .35s ease",WebkitOverflowScrolling:"touch"}}>
      <div style={{width:40,height:4,borderRadius:2,background:P.cream,margin:"0 auto 18px"}}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontSize:26,fontWeight:500,color:P.text,letterSpacing:"-.4px"}}>Ajustes</div>
        <button onClick={onClose} style={{width:34,height:34,borderRadius:17,border:`1px solid ${P.border}`,background:P.card,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Icon n="close" size={14} color={P.text} sw={2}/></button>
      </div>

      {/* PHASE */}
      <div style={{marginBottom:18,padding:14,borderRadius:18,background:P.card,border:`1px solid ${P.border}`}}>
        <div style={{fontSize:11,letterSpacing:1.3,textTransform:"uppercase",color:P.muted,fontWeight:700,marginBottom:8}}>Fase del retinal</div>
        <div style={{display:"flex",gap:8}}>
          {[{id:1,t:"Fase 1",d:"2×/sem (L · J)"},{id:2,t:"Fase 2",d:"3×/sem (L · X · V)"}].map(o=>{
            const a=phase===o.id;
            return<button key={o.id} onClick={()=>onPhaseChange(o.id)} style={{flex:1,padding:"10px 12px",borderRadius:14,border:`1.5px solid ${a?P.retinal:P.border}`,background:a?P.retinalSoft:"transparent",color:a?P.retinal:P.text,cursor:"pointer",textAlign:"left",transition:"all .2s"}}>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:"-.1px"}}>{o.t}</div>
              <div style={{fontSize:11,opacity:.7,marginTop:2}}>{o.d}</div>
            </button>;
          })}
        </div>
      </div>

      {/* STORAGE */}
      <div style={{marginBottom:18,padding:14,borderRadius:18,background:P.card,border:`1px solid ${P.border}`}}>
        <div style={{fontSize:11,letterSpacing:1.3,textTransform:"uppercase",color:P.muted,fontWeight:700,marginBottom:8}}>Tus datos · guardados en este iPhone</div>
        <Row label="Rutinas completadas" value={history.length}/>
        <Row label="Entradas de diario" value={diary.length}/>
        <Row label="Fotos de progreso" value={`${photos.length} · ${photoMB.toFixed(1)} MB`}/>
        <Row label="Espacio usado" value={`${mb(stor.used)} / ${mb(stor.quota)} MB`}/>
        <div style={{fontSize:11,color:P.muted,marginTop:10,lineHeight:1.5}}>📱 Todo vive en Safari del iPhone. No se sube a internet. Exporta para tener un respaldo.</div>
      </div>

      {/* EXPORT / IMPORT */}
      <div style={{marginBottom:18,padding:14,borderRadius:18,background:P.card,border:`1px solid ${P.border}`}}>
        <div style={{fontSize:11,letterSpacing:1.3,textTransform:"uppercase",color:P.muted,fontWeight:700,marginBottom:10}}>Respaldo</div>
        <button onClick={handleExport} style={{width:"100%",height:48,borderRadius:14,border:"none",background:P.text,color:P.onDark,fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>📥 Exportar mis datos (JSON)</button>
        <input ref={fileRef} type="file" accept="application/json" onChange={handleImportFile} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current?.click()} disabled={importing} style={{width:"100%",height:48,borderRadius:14,border:`1px solid ${P.border}`,background:"transparent",color:P.text,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>📤 {importing?"Importando...":"Importar desde archivo"}</button>
        {msg&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:10,background:msg.type==="ok"?P.greenSoft:P.retinalSoft,color:msg.type==="ok"?P.green:P.retinal,fontSize:12,fontWeight:600}}>{msg.text}</div>}
      </div>

      {/* ABOUT */}
      <div style={{padding:"14px 4px",fontSize:11,color:P.muted,lineHeight:1.6,textAlign:"center"}}>
        K-Beauty · Mijal<br/>
        Hecho con amor 💕 · v1.1<br/>
        <a href="https://github.com/JP-RELMOTOR/rutina-kbeauty" target="_blank" rel="noopener" style={{color:P.muted,textDecoration:"underline"}}>código en GitHub</a>
      </div>
    </div>
  </div>;
}

// ─── APP ─────────────────────────────────────────
function App(){
  const [tab,setTab]=React.useState("today");
  const _restored=loadRoutineProgress(); // hoy mismo, mismo mode
  const [mode,setMode]=React.useState(()=>{
    if(_restored)return _restored.mode;
    const h=new Date().getHours();
    return h>=18||h<6?"night":"morning";
  });
  const [phase,setPhase]=React.useState(()=>parseInt(ls("kb_phase","2")));
  const [activeIdx,setActiveIdx]=React.useState(null);
  const [doneSteps,setDoneSteps]=React.useState(()=>_restored?new Set(_restored.doneSteps):new Set());
  const [showComplete,setShowComplete]=React.useState(false);
  const [showCamera,setShowCamera]=React.useState(false);
  const [history,setHistory]=React.useState(()=>ls("kb_history",[]));
  const [diary,setDiary]=React.useState(()=>ls("kb_diary",[]));
  const [photos,setPhotos]=React.useState([]);
  const [started,setStarted]=React.useState(false);
  const [showSettings,setShowSettings]=React.useState(false);
  const [hasUpdate,setHasUpdate]=React.useState(false);
  const [updateDismissed,setUpdateDismissed]=React.useState(false);
  const [activeIngredient,setActiveIngredient]=React.useState(null);
  const [activeProduct,setActiveProduct]=React.useState(null);
  const [showImport,setShowImport]=React.useState(false);
  const [backupReminderOpen,setBackupReminderOpen]=React.useState(()=>shouldShowBackupReminder());
  const [expressMode,setExpressMode]=React.useState(()=>ls("kb_express_mode",false));
  const [showRecap,setShowRecap]=React.useState(false);
  const [showJourney,setShowJourney]=React.useState(false);
  const [viewerPhoto,setViewerPhoto]=React.useState(null);

  async function handlePhotoDeleted(id){
    const p=await dbGetPhotos();
    setPhotos(p||[]);
    haptic("medium");
  }
  React.useEffect(()=>{
    if(shouldShowWeeklyRecap(history)){
      const t=setTimeout(()=>setShowRecap(true),600);
      return()=>clearTimeout(t);
    }
  },[]);
  const recapStats=React.useMemo(()=>showRecap?computeWeekStats(history,diary,ROUTINES):null,[showRecap,history,diary]);
  function handleCloseRecap(){markRecapShown();setShowRecap(false);}
  function handleExpressChange(v){setExpressMode(v);lsSet("kb_express_mode",v);setDoneSteps(new Set());setActiveIdx(null);setStarted(false);clearRoutineProgress();haptic("light");}

  async function handleBackupExport(){
    try{await exportAllData();}catch(_){}
    markBackupReminderSeen();
    setBackupReminderOpen(false);
    haptic("medium");
  }
  function handleBackupDismiss(){
    markBackupReminderSeen();
    setBackupReminderOpen(false);
  }

  async function handleImportDone(){
    const p=await dbGetPhotos();
    setPhotos(p||[]);
    haptic("medium");
  }


  // Load photos from IndexedDB
  React.useEffect(()=>{dbGetPhotos().then(p=>setPhotos(p||[]));},[]);

  // Listen for PWA update events from the SW registration
  React.useEffect(()=>{
    const h=()=>setHasUpdate(true);
    window.addEventListener("pwa-update-available",h);
    return()=>window.removeEventListener("pwa-update-available",h);
  },[]);

  function handleApplyUpdate(){
    const w=window.__pwaWaitingWorker;
    if(w&&w.postMessage){w.postMessage({type:"SKIP_WAITING"});}
    else{window.location.reload();}
  }
  function handlePhaseChange(p){setPhase(p);lsSet("kb_phase",p);haptic("light");}
  async function handleDataRestored(){
    setHistory(ls("kb_history",[]));
    setDiary(ls("kb_diary",[]));
    setPhase(parseInt(ls("kb_phase","2"))||2);
    const p=await dbGetPhotos();
    setPhotos(p||[]);
  }

  const baseRoutine=ROUTINES[mode]||ROUTINES.night;
  const routine=React.useMemo(()=>{
    if(!expressMode)return baseRoutine;
    const filtered=baseRoutine.steps.filter(s=>s.essential);
    const totalMin=filtered.reduce((a,s)=>a+s.min,0);
    return {...baseRoutine,steps:filtered,total:filtered.length,minutes:Math.round(totalMin),label:baseRoutine.label+" · Express ⚡"};
  },[baseRoutine,expressMode]);
  const streak=getStreak(history);
  const completedCount=routine.steps.filter(s=>doneSteps.has(s.id)).length;
  const completedMin=routine.steps.filter(s=>doneSteps.has(s.id)).reduce((a,s)=>a+s.min,0);
  const isFinished=completedCount===routine.steps.length&&routine.steps.length>0;

  function handleSetMode(m){setMode(m);setDoneSteps(new Set());setActiveIdx(null);setStarted(false);clearRoutineProgress();}
  React.useEffect(()=>{saveRoutineProgress(mode,doneSteps);},[mode,doneSteps]);
  React.useEffect(()=>{setDoneSteps(new Set());setActiveIdx(null);setStarted(false);},[mode]);

  function stepState(s,i){return doneSteps.has(s.id)?"done":i===activeIdx?"active":"pending";}

  function handleTap(i){
    if(!started)setStarted(true);
    setActiveIdx(i);
  }

  function handleComplete(s,i){
    haptic("medium");
    const next=new Set(doneSteps);next.add(s.id);setDoneSteps(next);
    const nextIdx=routine.steps.findIndex((st,ii)=>ii>i&&!next.has(st.id));
    if(nextIdx===-1){setActiveIdx(null);setTimeout(()=>setShowComplete(true),350);}
    else setActiveIdx(nextIdx);
  }

  function handleSkip(s,i){
    const nextIdx=routine.steps.findIndex((st,ii)=>ii>i&&!doneSteps.has(st.id));
    setActiveIdx(nextIdx===-1?null:nextIdx);
  }

  function handleCompleteClose(mood,note){
    const rKey=mode==="morning"?"morning":mode==="nightRetinal"?"pm_retinal":"pm_normal";
    const today=todayStr();
    const session={date:today,time:new Date().toTimeString().slice(0,5),routine:rKey,steps:completedCount};
    const newH=[...history,session];
    setHistory(newH);lsSet("kb_history",newH);
    if(mood||note){
      const entry={date:today,time:session.time,routine:rKey,feel:mood||null,note:note||""};
      const newD=[...diary,entry];setDiary(newD);lsSet("kb_diary",newD);
    }
    setShowComplete(false);setDoneSteps(new Set());setActiveIdx(null);setStarted(false);clearRoutineProgress();
  }

  function handlePhotoSave(entry){
    setPhotos(prev=>[...prev,entry]);
  }

  return<div style={{width:"100%",height:"100%",background:P.bg,position:"relative",overflow:"hidden"}}>
    <div style={{height:"100%",overflowY:"auto",paddingBottom:110,WebkitOverflowScrolling:"touch"}}>
      {tab==="today"&&<TodayScreen mode={mode} setMode={handleSetMode} routine={routine} stepState={stepState} onTap={handleTap} onComplete={handleComplete} onSkip={handleSkip} completedCount={completedCount} completedMin={completedMin} isFinished={isFinished} onShowComplete={()=>setShowComplete(true)} streak={streak} phase={phase} doneSteps={doneSteps} onOpenSettings={()=>setShowSettings(true)} onIngredient={setActiveIngredient} backupReminderOpen={backupReminderOpen} onBackupExport={handleBackupExport} onBackupDismiss={handleBackupDismiss} expressMode={expressMode} onExpressChange={handleExpressChange}/>}
      {tab==="history"&&<HistoryScreen history={history} streak={streak} phase={phase}/>}
      {tab==="diary"&&<DiaryScreen diary={diary} photos={photos} onAddPhoto={()=>setShowCamera(true)} onImportPhotos={()=>setShowImport(true)} onOpenJourney={()=>setShowJourney(true)} onOpenPhoto={setViewerPhoto}/>}
      {tab==="progress"&&<ProgressScreen history={history} streak={streak}/>}
      {tab==="info"&&<InfoScreen onOpenProduct={setActiveProduct} onOpenIngredient={setActiveIngredient}/>}
    </div>
    <TabBar tab={tab} onTab={setTab}/>
    {hasUpdate&&!updateDismissed&&<UpdateBanner onApply={handleApplyUpdate} onDismiss={()=>setUpdateDismissed(true)}/>}
    {showSettings&&<SettingsSheet onClose={()=>setShowSettings(false)} history={history} diary={diary} photos={photos} phase={phase} onPhaseChange={handlePhaseChange} onDataRestored={handleDataRestored}/>}
    {activeIngredient&&<IngredientSheet ingredient={activeIngredient} onClose={()=>setActiveIngredient(null)}/>}
    {activeProduct&&<ProductDetailSheet product={activeProduct} onClose={()=>setActiveProduct(null)} onOpenIngredient={setActiveIngredient}/>}
    {showImport&&<ImportPhotos onClose={()=>setShowImport(false)} onSave={handleImportDone}/>}
    {showRecap&&recapStats&&<WeeklyRecapSheet stats={recapStats} onClose={handleCloseRecap}/>}
    {showJourney&&<SkinJourneySheet photos={photos} onClose={()=>setShowJourney(false)} onOpenPhoto={setViewerPhoto}/>}
    {viewerPhoto&&<PhotoViewer photo={viewerPhoto} onClose={()=>setViewerPhoto(null)} onDelete={handlePhotoDeleted}/>}
    {showComplete&&<CompleteSheet stats={{completed:completedCount,total:routine.steps.length,minutes:Math.round(completedMin),streak}} onPhoto={()=>setShowCamera(true)} onClose={handleCompleteClose}/>}
    {showCamera&&<PhotoCapture onClose={()=>setShowCamera(false)} onSave={handlePhotoSave}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
(async function(){
  // Persistent storage: ask iOS not to evict our IndexedDB / localStorage.
  try {
    if (navigator.storage && navigator.storage.persist) {
      const persisted = await navigator.storage.persisted();
      if (!persisted) await navigator.storage.persist();
    }
  } catch(_) {}

  // ─── VERSION POLLING (detecta cambios en index.html, no depende del SW) ───
  // Cuando GitHub Pages tiene un index.html más nuevo que el que la app cargó,
  // dispara `pwa-update-available` y aparece el banner. Funciona también si solo
  // cambia el contenido (no el SW).
  let __initialLastMod = null;
  async function pollVersion(){
    if (document.visibilityState !== "visible") return;
    try {
      const r = await fetch("./?_v=" + Date.now(), {method:"HEAD", cache:"no-store"});
      if (!r.ok) return;
      const remote = r.headers.get("Last-Modified") || r.headers.get("ETag") || "";
      if (!remote) return;
      if (__initialLastMod === null) {
        __initialLastMod = remote;
        return;
      }
      if (remote !== __initialLastMod) {
        window.dispatchEvent(new CustomEvent("pwa-update-available"));
      }
    } catch(_) {}
  }
  pollVersion(); // baseline capture
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") pollVersion();
  });
  setInterval(pollVersion, 5 * 60 * 1000); // cada 5 min mientras esté abierta

  // ─── SERVICE WORKER ─────────────────────────────────────────
  if (!("serviceWorker" in navigator)) return;
  const reg = await navigator.serviceWorker.register("sw.js").catch(() => null);
  if (!reg) return;

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") reg.update().catch(()=>{});
  });

  function announce(worker){
    window.__pwaWaitingWorker = worker;
    window.dispatchEvent(new CustomEvent("pwa-update-available"));
  }
  function track(worker){
    worker.addEventListener("statechange", () => {
      if (worker.state === "installed" && navigator.serviceWorker.controller) announce(worker);
    });
  }
  if (reg.waiting && navigator.serviceWorker.controller) announce(reg.waiting);
  if (reg.installing) track(reg.installing);
  reg.addEventListener("updatefound", () => reg.installing && track(reg.installing));

  let reloaded = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (reloaded) return;
    reloaded = true;
    window.location.reload();
  });
})();
</script>
